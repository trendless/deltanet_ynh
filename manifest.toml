#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "deltanet"
name = "DeltaNet"
description.en = ""
description.fr = ""

version = "2026.07.06~ynh1"

maintainers = [""]

[upstream]
license = ""
website = ""
demo = ""
admindoc = ""
code = "https://github.com/lambadalambda/deltanet"

[integration]
yunohost = ">= 12.1.39"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "50M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "all_users"

[resources]
    [resources.sources.main]
    url = "https://github.com/lambadalambda/deltanet/archive/41ddd02189ab75fa0855376fa9974762a1083060.tar.gz"
    sha256 = "bd716659f27a13b1ade2fd254dfdc47af6786b4718991ff466c186e27a9dbf8c"
    autoupdate.strategy = "latest_github_commit"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"
    
    [resources.ports]

    [resources.nodejs]
    version = "24"
