#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "headwater"
name = "Headwater"
description.en = ""
description.fr = ""

version = "2026.07.19~ynh1"

maintainers = [""]

[upstream]
license = "Unlicense"
website = ""
demo = ""
admindoc = ""
code = "https://github.com/lambadalambda/headwater"

[integration]
yunohost = ">= 12.1.39"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "50M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

    [install.new_or_restore]
    type = "select"
    ask = "Do you want to create a new account or restore from a backup?"
    choices = ["new", "restore"]

    [install.display_name]
    type = "string"
    ask = "What do you want your display name to be?"
    visible = "new_or_restore == 'new'"

    [install.target_relay]
    type = "string"
    ask = "Which chatmail relay do you want to use?"
    help = "e.g., https://nine.testrun.org"
    default = "https://nine.testrun.org"

[resources]
    [resources.sources.main]
    url = "https://github.com/lambadalambda/headwater/archive/6131476f33c9b9f5a7ba696d76ab88e39959c07f.tar.gz"
    sha256 = "d5f43dec1043bfdbfd4bf56d27a7af66d4b9cd9d2c946d3cb06ba30c69330c3e"
    autoupdate.strategy = "latest_github_commit"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"
    
    [resources.ports]
    main.default = 4030

    [resources.nodejs]
    version = "24"
